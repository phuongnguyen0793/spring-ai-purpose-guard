spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sample_ai?createDatabaseIfNotExist=true
    username: dev
    password: dev
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      continue-on-error: false
  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          model: nomic-embed-text
      chat:
        options:
          model: llama3.2

app:
  search:
    default-top-k: 5
    default-threshold: 0.5
    seed-on-startup: true
  rule:
    # Filesystem path (relative to the working directory) of the trained CSV.
    # Loaded into MySQL on startup; only newly-versioned rows are imported.
    csv-path: data/company_name_rules.csv
  training:
    # Offline LLM training is disabled by default. Enable with:
    #   ./gradlew bootRun --args="--app.training.enabled=true"
    enabled: false
    seed-csv-path: data/company_name_seed.csv
    output-csv-path: data/company_name_rules.csv

server:
  port: 8080

logging:
  level:
    root: INFO
    org.springframework.ai: INFO
    com.example.springai: DEBUG
